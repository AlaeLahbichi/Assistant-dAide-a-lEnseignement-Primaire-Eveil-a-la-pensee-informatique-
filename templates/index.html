<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Bebras - Aventure Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background-image: url("../static/images/backgroud.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Image de fond */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/cartographer.png');
            background-repeat: repeat;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .floating-emoji {
            position: fixed;
            font-size: 35px;
            pointer-events: none;
            z-index: 0;
            animation: floatUp 8s infinite ease-in-out;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) translateX(calc(100% - 50vw)) rotate(360deg);
                opacity: 0;
            }
        }

        .floating-emoji:nth-child(even) {
            animation-duration: 10s;
            animation-delay: 2s;
        }
        
        .floating-emoji:nth-child(3n) {
            animation-duration: 12s;
            animation-delay: 4s;
        }
        
        .floating-emoji:nth-child(5n+2) {
            animation-duration: 7s;
            animation-delay: 1s;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mascot {
            font-size: 45px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin: 0;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        .clear-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(102,126,234,0.3);
        }

        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .clear-btn:active {
            transform: translateY(0);
        }

        /* Zone de chat */
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .messages {
            height: 520px;
            overflow-y: auto;
            padding: 25px;
            background: #fafbff;
        }

        /* Messages individuels */
        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            text-align: right;
        }

        .assistant-message {
            text-align: left;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            text-align: left;
            word-wrap: break-word;
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant-message .message-bubble {
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85rem;
            display: block;
            opacity: 0.8;
        }

        .message-content {
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message-content pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
            font-family: inherit;
            white-space: pre-wrap;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            background: #fafbff;
        }

        .chat-input:focus {
            outline: none;
            border-color: #764ba2;
            background: white;
            box-shadow: 0 0 0 3px rgba(118,75,162,0.1);
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        .assistant-message .loading {
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #764ba2;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 8px;
            font-weight: bold;
            vertical-align: middle;
        }

        .badge-correct {
            background: #4caf50;
            color: white;
        }

        .badge-retry {
            background: #ff9800;
            color: white;
        }

        .message-content strong {
            color: #667eea;
        }

        .message-content br {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .message-bubble {
                max-width: 95%;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .input-area {
                flex-direction: column;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .mascot {
                font-size: 35px;
            }
            
            .messages {
                height: 450px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <div class="mascot">🐻‍❄️</div>
                <div>
                    <h1>Assistant Bebras</h1>
                    <div class="subtitle">Apprends en t'amusant ! ✨</div>
                </div>
            </div>
            <button class="clear-btn" onclick="clearConversation()">
                🗑️ Nouvelle aventure
            </button>
        </div>

        <div class="chat-container">
            <div id="messages" class="messages">
                <div class="message assistant-message">
                    <div class="message-bubble">
                        <div class="message-name">🎮 Assistant Bebras</div>
                        <div class="message-content">
                            Salut ! Prêt(e) pour une aventure éducative ? 😊<br><br>
                            Dis-moi ce que tu veux apprendre :<br>
                            • Mathématiques 📐<br>
                            • Logique 🧩<br>
                            • Ou une activité amusante 🎨
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Écris ta réponse ici... ✏️">
                <button id="submitButton" class="submit-btn" onclick="handleSubmit()">
                    <span>✨</span> Envoyer
                </button>
            </div>
        </div>
    </div>

    <script>
        let firstCall = true;
        let waitingForResponse = false;
        let lastQuestion = "";

        function createFloatingEmojis() {
            const emojis = ['🌟', '⭐', '🎈', '🎨', '📚', '🧸', '🐻', '🐼', '🦊', '🐰', '🦄', '🌈', '🍎', '💡', '🎵', '⚽', '🚀', '🎪'];
            for (let i = 0; i < 25; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'floating-emoji';
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + '%';
                emoji.style.animationDelay = Math.random() * 15 + 's';
                emoji.style.animationDuration = 8 + Math.random() * 7 + 's';
                emoji.style.fontSize = (25 + Math.random() * 30) + 'px';
                emoji.style.opacity = 0.3 + Math.random() * 0.4;
                document.body.appendChild(emoji);
            }
        }

        function clearConversation() {
            if (confirm('✨ Veux-tu vraiment recommencer l\'aventure ?')) {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = `
                    <div class="message assistant-message">
                        <div class="message-bubble">
                            <div class="message-name">🎮 Assistant Bebras</div>
                            <div class="message-content">
                                Nouvelle aventure ! ✨<br><br>
                                Que souhaites-tu apprendre aujourd'hui ?<br>
                                • Mathématiques 📐<br>
                                • Logique 🧩<br>
                                • Une activité amusante 🎨
                            </div>
                        </div>
                    </div>
                `;
                firstCall = true;
                waitingForResponse = false;
                lastQuestion = "";
                const button = document.getElementById('submitButton');
                button.innerHTML = '<span>✨</span> Envoyer';
                button.disabled = false;
                document.getElementById('chatInput').value = '';
                document.getElementById('chatInput').placeholder = 'Écris ta réponse ici... ✏️';
                document.getElementById('chatInput').focus();
            }
        }

        function addMessage(role, content, verdict = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            
            const name = role === 'user' ? '🧒 Toi' : '🎮 Assistant Bebras';
            let badgeHtml = '';
            if (verdict === 'Correct') {
                badgeHtml = '<span class="badge badge-correct">✅ BRAVO !</span>';
            } else if (verdict === 'À retravailler') {
                badgeHtml = '<span class="badge badge-retry">🔄 À retravailler</span>';
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-name">${name} ${badgeHtml}</div>
                    <div class="message-content">${formatContent(content)}</div>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function formatContent(content) {
            if (typeof content === 'string') {
                let formatted = content.replace(/\n/g, '<br>');
                formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formatted = formatted.replace(/- (.*?)(<br>|$)/g, '• $1$2');
                formatted = formatted.replace(/\d\. /g, '<br>$&');
                return formatted;
            } else if (typeof content === 'object') {
                return '<pre>' + JSON.stringify(content, null, 2) + '</pre>';
            }
            return content;
        }

        function formatFeedback(feedback) {
            let html = '';
            if (feedback.verdict) {
                const icon = feedback.verdict === 'Correct' ? '✅' : '🔄';
                html += `<strong>${icon} Verdict : ${feedback.verdict}</strong><br><br>`;
            }
            if (feedback.explication_pedagogique) {
                html += `<strong>📖 Explication :</strong><br>${feedback.explication_pedagogique}<br><br>`;
            }
            if (feedback.analyse_des_options) {
                html += `<strong>📖 Analyse des Options :</strong><br>${feedback.analyse_des_options}<br><br>`;
            }
            if (feedback.solution_detaillee) {
                html += `<strong>📖 Solution détaillée :</strong><br>${feedback.solution_detaillee}<br><br>`;
            }
            if (feedback.message_eleve) {
                html += `<strong>✨ Message :</strong><br>${feedback.message_eleve}`;
            }
            return html;
        }

        function addLoadingMessage(type) {
            const messagesDiv = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = `${type}LoadingMessage`;
            loadingDiv.className = 'message assistant-message';
            loadingDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-name">🎮 Assistant Bebras</div>
                    <div class="message-content">
                        ${type === 'response' ? '🤔 Je prépare ton activité personnalisée...' : '📝 Je vérifie ta réponse...'}
                        <div class="loading"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoadingMessage(type) {
            const loadingMessage = document.getElementById(`${type}LoadingMessage`);
            if (loadingMessage) loadingMessage.remove();
        }

        async function handleSubmit() {
            if (waitingForResponse) return;
            if (firstCall) {
                await sendPrompt();
            } else {
                await sendUserResponse();
            }
        }

        async function sendPrompt() {
            const input = document.getElementById("chatInput");
            const button = document.getElementById("submitButton");
            const prompt = input.value;
            if (!prompt.trim()) return;

            addMessage('user', prompt);
            input.value = "";
            button.disabled = true;
            waitingForResponse = true;
            addLoadingMessage('response');

            try {
                // Envoi vers n8n
                await fetch("http://localhost:5678/webhook-test/receive?prompt=" + encodeURIComponent(prompt), { method: "GET" });
                
                setTimeout(() => { waitForFlaskResponse(); }, 1500);
            } catch (error) {
                removeLoadingMessage('response');
                addMessage('assistant', "❌ Erreur de connexion avec le serveur.");
                button.disabled = false;
                waitingForResponse = false;
            }
        }

        async function sendUserResponse() {
            const input = document.getElementById("chatInput");
            const button = document.getElementById("submitButton");
            const userResponse = input.value;
            if (!userResponse.trim()) return;

            addMessage('user', userResponse);
            input.value = "";
            button.disabled = true;
            waitingForResponse = true;
            addLoadingMessage('feedback');

            try {
                await fetch("http://localhost:5678/webhook-test/response", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ response: userResponse, request: lastQuestion })
                });
                waitForFeedbackResponse();
            } catch (error) {
                removeLoadingMessage('feedback');
                addMessage('assistant', "❌ Erreur lors de l'analyse.");
                button.disabled = false;
                waitingForResponse = false;
            }
        }

        async function waitForFlaskResponse() {
            const button = document.getElementById("submitButton");
    
            const interval = setInterval(async function () {
                try {
                    const response = await fetch("http://127.0.0.1:5000/get-latest-response", { method: "GET" });
                    const data = await response.json();

                    if (data.success && data.response && data.response.length > 10) {
                
                        if (data.response !== lastQuestion) {
                            clearInterval(interval);
                            removeLoadingMessage('response');
                    
                            lastQuestion = data.response;
                            addMessage('assistant', data.response);
                    
                            waitingForResponse = false;
                            firstCall = false;
                            button.innerHTML = '<span>🎯</span> Répondre';
                            button.disabled = false;
                            document.getElementById('chatInput').focus();
                            console.log("Activité reçue et affichée !");
                        }
                    }
                } catch (error) {
                    console.error("Erreur lors du polling Flask:", error);
                }
            }, 2000);
        }

        async function waitForFeedbackResponse() {
            const interval = setInterval(async function () {
                try {
                    const response = await fetch("http://127.0.0.1:5000/get-latest-feedback", { method: "GET" });
                    const data = await response.json();

                    if (data.success) {
                        clearInterval(interval);
                        removeLoadingMessage('feedback');
                        
                        const formattedFeedback = formatFeedback(data.feedback);

                        addMessage('assistant', formattedFeedback, data.feedback.verdict);
                        
                        waitingForResponse = true;
                        addLoadingMessage('response');
                        setTimeout(() => { waitForFlaskResponse(); }, 2000);
                    }
                } catch (error) { /* Continue polling */ }
            }, 2500);
        }

        createFloatingEmojis();
        document.getElementById('chatInput').focus();
        document.getElementById('chatInput').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') handleSubmit(); 
        });
    </script>
</body>
</html>
